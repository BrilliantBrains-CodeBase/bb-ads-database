services:

  # ── Nginx reverse proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - frontend
      - backend

  # ── API replica 1 ────────────────────────────────────────────────
  api1:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_INSTANCE=api1
    volumes:
      - brand_storage:/data/brands
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── API replica 2 ────────────────────────────────────────────────
  api2:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_INSTANCE=api2
    volumes:
      - brand_storage:/data/brands
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Background worker (scheduler) ───────────────────────────────
  worker:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_INSTANCE=worker
    command: ["python", "-m", "app.worker.scheduler"]
    volumes:
      - brand_storage:/data/brands
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - backend

  # ── MongoDB 7.0 ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-bb_ads}
    volumes:
      - mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Mongo Express (dev profile only) ────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2-20
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGODB_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_ROOT_PASSWORD:-changeme}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGODB_ROOT_USER:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD:-changeme}
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true  # API/MongoDB/Redis not directly exposed to host in prod

volumes:
  mongo_data:
  redis_data:
  brand_storage:
  nginx_logs:
