# ══════════════════════════════════════════════════════════════════════════════
# conf.d/api.conf — Virtual-host configuration for the BB Ads API
#
# Architecture
# ────────────
#   client → nginx (80/443) → upstream api_backend (api1:8000, api2:8000)
#
# HTTP (port 80):
#   • ACME challenge passthrough for Let's Encrypt certificate renewal
#   • All other requests → 301 redirect to HTTPS
#
# HTTPS (port 443):
#   • Let's Encrypt certificate (fullchain.pem / privkey.pem)
#   • HSTS with preload
#   • Rate-limited reverse proxy to FastAPI backend
#   • Claude SSE endpoints: buffering disabled, 5-min timeout
#   • CSV upload endpoint: tighter rate limit, larger body allowed
#   • Health check: no auth, no rate limit, no logging
#
# Domain setup
# ────────────
#   Replace every occurrence of <DOMAIN> with your actual domain name,
#   e.g.: api.youragency.com
#   Then obtain a certificate:
#     certbot certonly --webroot -w /var/www/certbot -d <DOMAIN>
# ══════════════════════════════════════════════════════════════════════════════


# ── Upstream pool ─────────────────────────────────────────────────────────────
#
# least_conn: send new requests to the replica with the fewest active
# connections — better than round-robin for endpoints with variable latency
# (Claude SSE holds connections much longer than /health).
#
# Upstream health checks are passive: a server is marked "down" after
# max_fails consecutive failures within fail_timeout seconds.  It is
# re-tried after fail_timeout.  The app's own /health endpoint doubles as
# the Docker healthcheck so a crashed container is removed from the pool
# before nginx even sees a failure.
upstream api_backend {
    least_conn;

    server api1:8000  max_fails=3  fail_timeout=30s;
    server api2:8000  max_fails=3  fail_timeout=30s;

    # Upstream keep-alive: reuse TCP connections to the backend.
    # 32 idle connections per worker process; must be < worker_rlimit_nofile.
    keepalive        32;
    keepalive_timeout 60s;
}


# ── Shared proxy headers snippet (referenced in every location) ───────────────
#
# Defined as a map + a set of proxy_set_header directives that are repeated
# verbatim in each location block so nginx does not silently inherit (and then
# lose) headers from parent contexts.


# ── HTTP server — ACME challenge + redirect ───────────────────────────────────
server {
    listen       80;
    listen  [::]:80;
    server_name  <DOMAIN>;

    # Let's Encrypt ACME challenge — Certbot writes files here during renewal.
    # Mount the same volume in docker-compose.yml:
    #   volumes:
    #     - certbot_www:/var/www/certbot:ro
    location ^~ /.well-known/acme-challenge/ {
        root       /var/www/certbot;
        try_files  $uri =404;
        access_log off;
    }

    # Redirect everything else to HTTPS (permanent).
    location / {
        return 301 https://$host$request_uri;
    }
}


# ── HTTPS server — main production vhost ──────────────────────────────────────
server {
    listen       443 ssl http2;
    listen  [::]:443 ssl http2;
    server_name  <DOMAIN>;

    # ── Let's Encrypt certificate ─────────────────────────────────────────────
    ssl_certificate      /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/<DOMAIN>/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/<DOMAIN>/chain.pem;

    # ── HSTS — tell browsers to always use HTTPS for this domain ─────────────
    # max-age=63072000 = 2 years (required for HSTS preload list submission).
    # includeSubDomains covers all subdomains.
    # Remove `preload` if you don't intend to submit to the preload list.
    add_header Strict-Transport-Security
        "max-age=63072000; includeSubDomains; preload"  always;

    # ── Request body limit ────────────────────────────────────────────────────
    # Overrides global 10m; CSV uploads are the largest expected payload.
    client_max_body_size  10m;

    # ─────────────────────────────────────────────────────────────────────────
    # Location blocks — ordered from most-specific to least-specific.
    # nginx uses the first matching location; `=` prefix is exact match (fastest).
    # `~` is regex; evaluated in config order after `^~` prefix matches fail.
    # ─────────────────────────────────────────────────────────────────────────


    # ── Health check — public, no auth, no rate limit, no logging ────────────
    # Used by Docker healthcheck, load-balancer probes, and uptime monitors.
    location = /health {
        proxy_pass          http://api_backend;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    Connection        "";
        proxy_read_timeout  5s;
        access_log          off;
    }


    # ── Auth endpoints — strict rate limit ────────────────────────────────────
    # 5 req/min with a burst of 3 (queued, not dropped).
    # nodelay: the burst is served immediately but each request consumes a token.
    # Rate matches AUTH_RATE_LIMIT_ATTEMPTS in app/core/config.py.
    location ~ ^/api/v1/auth/(token|refresh|logout) {
        limit_req         zone=auth_limit  burst=3  nodelay;
        limit_req_status  429;

        proxy_pass          http://api_backend;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
        proxy_read_timeout  15s;
    }


    # ── CSV upload — separate rate limit, larger body ─────────────────────────
    location ~ ^/api/v1/brands/[^/]+/performance/upload {
        limit_req         zone=upload_limit  burst=5  nodelay;
        limit_req_status  429;

        client_max_body_size  10m;

        proxy_pass          http://api_backend;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
        proxy_set_header    X-Correlation-ID   $http_x_correlation_id;
        proxy_read_timeout  120s;             # CSV processing can take time
    }


    # ── Claude SSE streaming endpoints ───────────────────────────────────────
    #
    # Server-Sent Events require:
    #   1. proxy_buffering off  — nginx must not buffer the response body;
    #      chunks must be forwarded to the client as they arrive from uvicorn.
    #   2. proxy_cache off      — caching would buffer the entire response.
    #   3. long proxy_read_timeout — Claude can take up to 5 min for complex
    #      multi-step predictions; default 60s would cut the stream short.
    #   4. chunked_transfer_encoding on — needed for HTTP/1.1 SSE over proxy.
    #   5. Connection: ""       — HTTP/1.1 upstream keep-alive (removes
    #      "Connection: close" that would terminate the stream).
    #
    # X-Accel-Buffering: no is set in the FastAPI response headers as well
    # (belt-and-suspenders), but nginx obeys proxy_buffering off directly.
    location ~ ^/api/v1/claude/(chat|recommendations|predictions) {
        limit_req         zone=api_limit  burst=10  nodelay;
        limit_req_status  429;

        proxy_pass              http://api_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        proxy_set_header        Connection         "";
        proxy_set_header        X-Correlation-ID   $http_x_correlation_id;

        # SSE / streaming — must not buffer
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          300s;   # 5 min for long Claude responses
        proxy_send_timeout          300s;
        proxy_connect_timeout       10s;
        chunked_transfer_encoding   on;
    }


    # ── All other API endpoints ───────────────────────────────────────────────
    # 60 req/min with a burst of 20.  Standard proxy settings with connection
    # reuse (Connection: "") and a 60-second read timeout for normal endpoints.
    location /api/ {
        limit_req         zone=api_limit  burst=20  nodelay;
        limit_req_status  429;

        proxy_pass          http://api_backend;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
        proxy_set_header    X-Correlation-ID   $http_x_correlation_id;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;

        # Proxy buffering ON for normal endpoints (improves throughput).
        # The app writes the full response before nginx forwards it, which
        # frees upstream workers sooner.
        proxy_buffering     on;
        proxy_buffer_size   16k;
        proxy_buffers       8 16k;
        proxy_busy_buffers_size 32k;
    }


    # ── Block everything else — no 404 leaks ─────────────────────────────────
    location / {
        return 404;
    }


    # ── Custom JSON error pages ───────────────────────────────────────────────
    # These match the error body format used by app/core/error_handlers.py so
    # clients see consistent shapes regardless of whether the error comes from
    # nginx or from FastAPI.

    error_page 429 /error/429.json;
    location = /error/429.json {
        internal;
        default_type  application/json;
        return 429
            '{"error":{"code":"RATE_LIMITED","message":"Too many requests — please slow down."}}';
    }

    error_page 413 /error/413.json;
    location = /error/413.json {
        internal;
        default_type  application/json;
        return 413
            '{"error":{"code":"PAYLOAD_TOO_LARGE","message":"Request body exceeds the 10 MB limit."}}';
    }

    error_page 502 /error/502.json;
    error_page 503 /error/503.json;
    error_page 504 /error/504.json;
    location = /error/502.json {
        internal;
        default_type  application/json;
        return 502
            '{"error":{"code":"BAD_GATEWAY","message":"API is temporarily unavailable."}}';
    }
    location = /error/503.json {
        internal;
        default_type  application/json;
        return 503
            '{"error":{"code":"SERVICE_UNAVAILABLE","message":"API is temporarily unavailable."}}';
    }
    location = /error/504.json {
        internal;
        default_type  application/json;
        return 504
            '{"error":{"code":"GATEWAY_TIMEOUT","message":"The upstream server timed out."}}';
    }
}
