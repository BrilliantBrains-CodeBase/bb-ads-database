# ── Upstream: two API replicas ────────────────────────────────────
upstream api_backend {
    least_conn;                         # route to replica with fewest active connections
    server api1:8000 max_fails=3 fail_timeout=30s;
    server api2:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── HTTP server (stub — SSL added in Phase 1 Week 6) ─────────────
server {
    listen 80;
    server_name _;                      # replace with real domain in production

    # ── Health check — no auth, no rate limit, no logging ─────────
    location = /health {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    # ── Auth endpoints — strict rate limit ────────────────────────
    location ~ ^/api/v1/auth/(token|refresh) {
        limit_req  zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Claude SSE streaming — long timeout, no buffering ─────────
    location ~ ^/api/v1/claude/(chat|recommendations|predictions) {
        limit_req  zone=api_limit burst=10 nodelay;

        proxy_pass             http://api_backend;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection        "";

        # SSE-specific: disable buffering so chunks stream immediately
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;    # Claude responses can take up to 5 min
        proxy_send_timeout     300s;
        chunked_transfer_encoding on;
    }

    # ── All other API endpoints ────────────────────────────────────
    location /api/ {
        limit_req  zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;

        # Pass correlation ID through if client sends one
        proxy_set_header   X-Correlation-ID  $http_x_correlation_id;
    }

    # ── Block everything else ──────────────────────────────────────
    location / {
        return 404;
    }

    # ── Custom error pages ─────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many requests. Please slow down."}}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        internal;
        default_type application/json;
        return 502 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"API is temporarily unavailable."}}';
    }
}

