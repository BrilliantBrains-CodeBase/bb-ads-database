# ══════════════════════════════════════════════════════════════════════════════
# nginx.conf — Global nginx configuration
#
# Tuned for:
#   • 2-replica FastAPI backend (api1:8000, api2:8000)
#   • Claude SSE streaming (long-lived chunked responses)
#   • Let's Encrypt TLS (managed by Certbot / acme-companion sidecar)
#   • Rate limiting at the edge before requests hit the app
#
# SSL certificate paths assume Certbot's standard layout:
#   /etc/letsencrypt/live/<DOMAIN>/fullchain.pem
#   /etc/letsencrypt/live/<DOMAIN>/privkey.pem
#
# To generate DH params on first deploy (do once, commit the result):
#   docker run --rm -v ./nginx:/out nginx:1.27-alpine \
#     openssl dhparam -out /out/dhparam.pem 2048
# ══════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;           # one per vCPU
worker_rlimit_nofile  65535;      # match OS ulimit for high-concurrency

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;     # per worker; total capacity = workers × 4096
    use epoll;                    # Linux event model — most efficient selector
    multi_accept on;              # accept all pending connections in one call
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    # Includes upstream_response_time for latency profiling and correlation ID
    # for distributed tracing across nginx → FastAPI.
    log_format  main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for" '
        'rt=$request_time ut="$upstream_response_time" '
        'uaddr="$upstream_addr" corr="$http_x_correlation_id"';

    access_log  /var/log/nginx/access.log  main  buffer=16k  flush=5s;

    # ── Core performance ──────────────────────────────────────────────────────
    sendfile              on;
    tcp_nopush            on;       # batch TCP packets (used with sendfile)
    tcp_nodelay           on;       # disable Nagle; critical for SSE/streaming
    keepalive_timeout     75s;
    keepalive_requests    1000;
    reset_timedout_connection on;

    # ── Body / header buffer limits ───────────────────────────────────────────
    client_body_buffer_size     128k;
    client_max_body_size         10m;   # CSV uploads; raise for large files
    client_header_buffer_size     1k;
    large_client_header_buffers  4 8k;
    client_body_timeout          30s;
    client_header_timeout        10s;
    send_timeout                 30s;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   4;            # 1-9; 4 is a good CPU vs ratio tradeoff
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        application/vnd.api+json;

    # ── Global security headers ───────────────────────────────────────────────
    # HSTS is added only in the HTTPS server block (conf.d/api.conf) so it
    # never fires over plain HTTP.  The headers below are safe for all contexts.
    server_tokens        off;
    add_header X-Frame-Options           "DENY"                                    always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=()"                     always;
    add_header Content-Security-Policy
        "default-src 'none'; frame-ancestors 'none'"                               always;

    # ── TLS session resumption (shared across all workers) ────────────────────
    ssl_session_cache    shared:SSL:20m;  # ~80 000 sessions cached in 20 MB
    ssl_session_timeout  1d;
    ssl_session_tickets  off;             # forward secrecy — don't use tickets

    # ── Modern TLS — TLS 1.2 minimum, prefer AEAD ciphers ────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  on;
    ssl_ciphers
        "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:"
        "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:"
        "ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:"
        "DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

    # Uncomment once dhparam.pem has been generated (see header comment):
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # ── OCSP stapling — speeds up TLS handshake for clients ──────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8  valid=300s  ipv6=off;
    resolver_timeout    5s;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Zones are global so they persist across hot-reloads and all vhosts.
    #
    #   auth_limit   — 5 req/min per IP  (matches AUTH_RATE_LIMIT_ATTEMPTS)
    #   api_limit    — 60 req/min per IP (general API — 1 req/s average)
    #   upload_limit — 10 req/min per IP (CSV upload / heavy endpoints)
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m    rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m     rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=upload_limit:10m  rate=10r/m;

    # ── Virtual-host / upstream configs ──────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
